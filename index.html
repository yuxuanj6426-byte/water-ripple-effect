<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水波紋手勢偵測</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a14;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      gap: 12px;
    }

    #info-bar {
      background: rgba(0, 200, 255, 0.07);
      border: 1px solid rgba(0, 200, 255, 0.28);
      border-radius: 6px;
      padding: 8px 24px;
      font-size: 14px;
      color: #00c8ff;
      letter-spacing: 0.05em;
      min-width: 420px;
      text-align: center;
    }

    #container {
      position: relative;
      width: 640px;
      height: 480px;
    }

    /* video 只作為影格來源，canvas 負責所有渲染 */
    #video {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 8px;
      opacity: 0;
      pointer-events: none;
    }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 8px;
    }

    #status { font-size: 13px; color: #555; }
    #error  { color: #f66; font-size: 13px; display: none; }
  </style>
</head>
<body>

  <div id="info-bar">食指尖端：等待偵測中...</div>

  <div id="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <p id="status">正在初始化 MediaPipe...</p>
  <p id="error"></p>

  <script type="module">
    import { FilesetResolver, HandLandmarker }
      from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

    // ── 手部骨架定義 ─────────────────────────────────────────────────
    const CONNECTIONS = [
      [0,1],[1,2],[2,3],[3,4],
      [0,5],[5,6],[6,7],[7,8],
      [5,9],[9,10],[10,11],[11,12],
      [9,13],[13,14],[14,15],[15,16],
      [13,17],[0,17],[17,18],[18,19],[19,20]
    ];
    const INDEX_FINGER_TIP = 8;

    // ── DOM ──────────────────────────────────────────────────────────
    const video   = document.getElementById('video');
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const status  = document.getElementById('status');
    const errEl   = document.getElementById('error');
    const infoBar = document.getElementById('info-bar');

    // ── 水波紋參數（可調整） ─────────────────────────────────────────
    const RW               = 200;   // 模擬緩衝區寬度（縮小解析度提升效能）
    const RH               = 150;   // 模擬緩衝區高度
    const DAMPING          = 0.986; // 阻尼：越接近 1 波紋消散越慢
    const REFRACT_STRENGTH = 0.08;  // 折射偏移係數（像素 / 波高單位）
    const RIPPLE_RADIUS    = 3;     // 注入波紋的圓形半徑（緩衝區格數）
    const RIPPLE_STRENGTH  = 255;   // 注入波紋的初始高度值

    // 兩個平坦 Float32 緩衝區
    //   cur = 目前幀的波高，prv = 前一幀的波高
    let cur = new Float32Array(RW * RH);
    let prv = new Float32Array(RW * RH);

    // ── 離屏畫布（用於捕捉 video 影格像素） ─────────────────────────
    const offscreen = document.createElement('canvas');
    const offCtx    = offscreen.getContext('2d', { willReadFrequently: true });

    // 預先分配目標 ImageData，避免每幀 GC 壓力
    let dstImageData = null;

    // ── 執行期狀態 ───────────────────────────────────────────────────
    let handLandmarker = null;
    let lastVideoTime  = -1;
    let fingerPos      = null;  // 食指尖端的 canvas 像素座標 {x, y}

    // ═══════════════════════════════════════════════════════════════
    // 水波紋物理模擬
    //
    //   核心公式（有限差分水波方程）：
    //     prv[i] = ( cur[left] + cur[right] + cur[top] + cur[bottom] ) / 2
    //              - prv[i]
    //   再乘阻尼係數，最後交換 cur / prv。
    // ═══════════════════════════════════════════════════════════════
    function rippleStep() {
      for (let y = 1; y < RH - 1; y++) {
        const base = y * RW;
        for (let x = 1; x < RW - 1; x++) {
          const i = base + x;
          prv[i] = (
            (cur[i - 1] + cur[i + 1] + cur[i - RW] + cur[i + RW]) * 0.5
            - prv[i]
          ) * DAMPING;
        }
      }
      // 交換緩衝區（避免配置新陣列）
      const tmp = cur; cur = prv; prv = tmp;
    }

    // 在 canvas 像素座標 (px, py) 處寫入圓形高度擾動
    function addRipple(px, py, radius = RIPPLE_RADIUS, strength = RIPPLE_STRENGTH) {
      const rx = ((px / canvas.width)  * RW + 0.5) | 0;
      const ry = ((py / canvas.height) * RH + 0.5) | 0;
      const r2 = radius * radius;
      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (dx * dx + dy * dy <= r2) {
            const nx = rx + dx, ny = ry + dy;
            if (nx > 0 && nx < RW - 1 && ny > 0 && ny < RH - 1) {
              cur[ny * RW + nx] = strength;
            }
          }
        }
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 影格渲染：計算波高梯度 → 折射偏移 → 取樣 video 像素
    //
    //   對每個輸出像素 (x, y)：
    //     gx = (cur[left] - cur[right]) * REFRACT_STRENGTH  ← 水平梯度
    //     gy = (cur[top]  - cur[bottom]) * REFRACT_STRENGTH ← 垂直梯度
    //     取樣來源座標：(x + gx, y + gy)
    // ═══════════════════════════════════════════════════════════════
    function renderFrame() {
      const W = canvas.width, H = canvas.height;
      const scaleX = RW / W, scaleY = RH / H;

      // 將目前 video 影格畫入離屏畫布並讀取像素
      offCtx.drawImage(video, 0, 0, W, H);
      const srcPx = offCtx.getImageData(0, 0, W, H).data;
      const dstPx = dstImageData.data;

      for (let y = 0; y < H; y++) {
        const ry    = (y * scaleY) | 0;
        const ryRW  = ry * RW;
        // 垂直鄰居列的起始索引（夾緊於邊界）
        const ry1RW = ry > 0      ? (ry - 1) * RW : ryRW;
        const ry2RW = ry < RH - 1 ? (ry + 1) * RW : ryRW;
        const yW    = y * W;

        for (let x = 0; x < W; x++) {
          const di = (yW + x) << 2;
          const rx = (x * scaleX) | 0;
          const ri = ryRW + rx;

          // 水平梯度（跨列邊界時設為 0，避免錯誤存取）
          const gx = (rx > 0 && rx < RW - 1)
            ? (cur[ri - 1] - cur[ri + 1]) * REFRACT_STRENGTH
            : 0;
          // 垂直梯度
          const gy = (cur[ry1RW + rx] - cur[ry2RW + rx]) * REFRACT_STRENGTH;

          // 計算折射後的來源座標並夾緊
          let sx = (x + gx) | 0;
          let sy = (y + gy) | 0;
          sx = sx < 0 ? 0 : sx >= W ? W - 1 : sx;
          sy = sy < 0 ? 0 : sy >= H ? H - 1 : sy;

          const si = (sy * W + sx) << 2;
          dstPx[di]     = srcPx[si];
          dstPx[di + 1] = srcPx[si + 1];
          dstPx[di + 2] = srcPx[si + 2];
          dstPx[di + 3] = 255;
        }
      }

      // 一次性寫入 canvas（隱式取代 clearRect）
      ctx.putImageData(dstImageData, 0, 0);
    }

    // ── 手部骨架繪製（在 putImageData 之後疊加） ─────────────────────
    function drawHand(landmarks) {
      const W = canvas.width, H = canvas.height;
      const toPixel = lm => ({ x: lm.x * W, y: lm.y * H });

      // 連接線
      ctx.strokeStyle = 'rgba(0, 210, 255, 0.85)';
      ctx.lineWidth   = 2;
      for (const [a, b] of CONNECTIONS) {
        const p1 = toPixel(landmarks[a]);
        const p2 = toPixel(landmarks[b]);
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }

      // 關鍵點（食指尖端特別標示）
      for (let i = 0; i < 21; i++) {
        const { x, y } = toPixel(landmarks[i]);
        const isTip = i === INDEX_FINGER_TIP;
        ctx.beginPath();
        ctx.arc(x, y, isTip ? 7 : 4, 0, Math.PI * 2);
        ctx.fillStyle = isTip
          ? 'rgba(255, 80, 80, 0.95)'
          : 'rgba(0, 255, 180, 0.9)';
        ctx.fill();
      }
    }

    // ── HUD 角框 ─────────────────────────────────────────────────────
    function drawCornerFrame() {
      const W = canvas.width, H = canvas.height;
      const sz = 28, m = 16;
      ctx.strokeStyle = 'rgba(0, 255, 180, 0.45)';
      ctx.lineWidth   = 2.5;
      for (const [x, y, dx, dy] of [
        [m, m, 1, 1], [W-m, m, -1, 1],
        [m, H-m, 1, -1], [W-m, H-m, -1, -1]
      ]) {
        ctx.beginPath();
        ctx.moveTo(x + dx * sz, y);
        ctx.lineTo(x, y);
        ctx.lineTo(x, y + dy * sz);
        ctx.stroke();
      }
    }

    // ═══════════════════════════════════════════════════════════════
    // 主渲染迴圈
    //
    //   執行順序：
    //     ① MediaPipe 偵測（每個新影格執行一次，避免重複送相同 timestamp）
    //     ② 在食指位置注入波紋擾動
    //     ③ 推進水波紋物理一步
    //     ④ 折射渲染 → putImageData 到 canvas
    //     ⑤ 疊加手部骨架（ctx API，不受 putImageData 影響）
    //     ⑥ HUD
    // ═══════════════════════════════════════════════════════════════
    function renderLoop() {
      requestAnimationFrame(renderLoop);

      // video 尚未就緒或模型未載入時跳過
      if (!handLandmarker || video.readyState < 2) return;

      // ① MediaPipe 偵測
      let landmarks = null;
      if (video.currentTime !== lastVideoTime) {
        lastVideoTime = video.currentTime;
        const results = handLandmarker.detectForVideo(video, performance.now());

        if (results.landmarks?.length > 0) {
          landmarks = results.landmarks[0];
          const tip = landmarks[INDEX_FINGER_TIP];
          fingerPos = { x: tip.x * canvas.width, y: tip.y * canvas.height };
          infoBar.textContent =
            `食指尖端 (INDEX_FINGER_TIP)：X = ${fingerPos.x.toFixed(1)}  ·  Y = ${fingerPos.y.toFixed(1)}`;
        } else {
          fingerPos = null;
          infoBar.textContent = '食指尖端：未偵測到手部';
        }
      }

      // ② 注入波紋（每幀持續注入，形成穩定漣漪源）
      if (fingerPos) addRipple(fingerPos.x, fingerPos.y);

      // ③ 物理模擬
      rippleStep();

      // ④ 折射渲染（覆蓋整個 canvas）
      renderFrame();

      // ⑤ 手部骨架疊加
      if (landmarks) drawHand(landmarks);

      // ⑥ HUD
      drawCornerFrame();
    }

    // ── 初始化 HandLandmarker ────────────────────────────────────────
    async function initHandLandmarker() {
      const vision = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      handLandmarker = await HandLandmarker.createFromOptions(vision, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/" +
            "hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
          delegate: "GPU"
        },
        runningMode: "VIDEO",
        numHands: 1
      });
    }

    // ── 啟動相機並設定所有緩衝區 ────────────────────────────────────
    async function startCamera() {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { width: 640, height: 480, facingMode: "user" },
        audio: false
      });
      video.srcObject = stream;

      // 等待第一幀資料就緒後才初始化尺寸相關資源
      await new Promise(r => video.addEventListener('loadeddata', r, { once: true }));

      const W = video.videoWidth, H = video.videoHeight;
      canvas.width     = W;
      canvas.height    = H;
      offscreen.width  = W;
      offscreen.height = H;
      dstImageData     = new ImageData(W, H);  // 預分配，整個生命週期重複使用

      status.textContent =
        `相機 ${W}×${H}  ·  波紋模擬 ${RW}×${RH}  ·  阻尼 ${DAMPING}`;
    }

    // ── 啟動 ────────────────────────────────────────────────────────
    try {
      await initHandLandmarker();
      await startCamera();
      renderLoop();
    } catch (err) {
      status.style.display = 'none';
      errEl.style.display  = 'block';
      errEl.textContent    = `錯誤：${err.message}`;
      console.error(err);
    }

  </script>
</body>
</html>
